services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: watchflare-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchflare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchflare_dev}
      POSTGRES_DB: ${POSTGRES_DB:-watchflare}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - watchflare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchflare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

networks:
  watchflare:
    driver: bridge

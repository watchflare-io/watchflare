version: 2

before:
  hooks:
    - npm ci --prefix frontend
    - npm run build --prefix frontend
    - mkdir -p backend/frontend/dist
    - bash -c "cp -r frontend/build/* backend/frontend/dist/"

builds:
  - id: agent
    dir: agent
    main: .
    binary: watchflare-agent
    ldflags:
      - -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: app
    dir: backend
    main: .
    binary: watchflare-hub
    tags:
      - embed_frontend
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: agent
    ids:
      - agent
    name_template: "watchflare-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: app
    ids:
      - app
    name_template: "watchflare-hub_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "watchflare_checksums.txt"

brews:
  - name: watchflare-agent
    ids:
      - agent
    repository:
      owner: watchflare-io
      name: homebrew-watchflare
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: watchflare-bot
      email: bot@watchflare.io
    homepage: "https://watchflare.io"
    description: "Watchflare host monitoring agent"
    license: "MIT"
    skip_upload: auto
    extra_install: |
      (bin/"watchflare-agent-launcher").write <<~EOS
        #!/bin/bash
        export WATCHFLARE_CONFIG_DIR="#{etc}/watchflare"
        export WATCHFLARE_DATA_DIR="#{var}/watchflare"
        exec #{bin}/watchflare-agent "$@"
      EOS
      (bin/"watchflare-agent-launcher").chmod 0755
    service: |
      run ["#{bin}/watchflare-agent-launcher"]
      log_path "#{var}/log/watchflare-agent.log"
      error_log_path "#{var}/log/watchflare-agent.log"
      keep_alive true
      restart_delay 5
      process_type :background
    caveats: |
      Register your agent before starting the service:
        watchflare-agent-launcher register --token=YOUR_TOKEN --host=YOUR_HOST

      Then start the service:
        brew services start watchflare-agent

      To update:
        brew upgrade watchflare-agent && brew services restart watchflare-agent

changelog:
  use: git
  sort: asc
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^chore: release"
      - "^chore: bump"
      - "Merge "

release:
  mode: replace

syntax = "proto3";

package agent.v1;

option go_package = "watchflare/shared/proto/agent/v1;proto";

// AgentService handles agent registration and heartbeats
service AgentService {
  // RegisterHost is called when an agent first connects
  rpc RegisterHost(RegisterHostRequest) returns (RegisterHostResponse);

  // Heartbeat is called every 5 seconds by the agent
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // SendMetrics sends system metrics to the backend
  rpc SendMetrics(SendMetricsRequest) returns (SendMetricsResponse);

  // ReportDroppedMetrics reports metrics that were dropped after max retries
  rpc ReportDroppedMetrics(ReportDroppedMetricsRequest) returns (ReportDroppedMetricsResponse);

  // SendPackageInventory sends package inventory to the backend
  rpc SendPackageInventory(SendPackageInventoryRequest) returns (SendPackageInventoryResponse);

  // SendServiceInventory sends the list of systemd services to the backend
  rpc SendServiceInventory(SendServiceInventoryRequest) returns (SendServiceInventoryResponse);

  // ReportServiceHealth reports current health state of monitored services
  rpc ReportServiceHealth(ReportServiceHealthRequest) returns (ReportServiceHealthResponse);
}

// RegisterHostRequest contains information sent during initial registration
message RegisterHostRequest {
  string registration_token = 1;   // The registration token from CreateAgent
  string hostname = 2;
  string ip_address_v4 = 3;
  string ip_address_v6 = 4;
  string platform = 5;              // gopsutil Platform: distro name ("fedora", "ubuntu", "macos")
  string platform_version = 6;      // gopsutil PlatformVersion: "43", "22.04"
  string platform_family = 7;       // gopsutil PlatformFamily: "rhel", "debian"
  string kernel_arch = 8;           // gopsutil KernelArch: "aarch64", "x86_64"
  string kernel_version = 9;        // gopsutil KernelVersion: "6.17.1-300.fc43.aarch64"
  int64 timestamp = 10;             // Unix timestamp in seconds (for anti-replay)

  // Environment detection
  string environment_type = 11;        // "physical", "physical_with_containers", "vm", "vm_with_containers", "container"
  string virtualization_system = 12;   // gopsutil VirtualizationSystem: "kvm", "vmware", "xen" (empty if physical)
  string container_runtime = 13;       // "docker", "lxc", "podman", "kubernetes" (empty if not in container)

  // Existing agent UUID (for re-registration without creating new agent)
  // If provided and exists in DB, the agent will be reactivated instead of creating a new one
  string existing_agent_uuid = 14;  // UUID from /var/lib/watchflare/agent.uuid (empty if first registration)
  string agent_version = 15;        // Agent binary version (e.g. "0.27.3"), set via ldflags

  // Additional gopsutil fields
  string os = 16;                    // gopsutil OS: "linux", "darwin", "windows"
  string virtualization_role = 17;   // gopsutil VirtualizationRole: "guest", "host" (empty if physical)
  string host_id = 18;               // gopsutil HostID: unique OS-provided UUID
  string cpu_model_name = 19;        // gopsutil cpu.InfoStat.ModelName: "Apple M4 Max", "Intel Xeon E5-2690"
  int32 cpu_physical_count = 20;     // gopsutil cpu.Counts(false): physical core count
  int32 cpu_logical_count = 21;      // gopsutil cpu.Counts(true): logical thread count
  double cpu_mhz = 22;               // gopsutil cpu.InfoStat.Mhz: base frequency
}

// RegisterHostResponse is sent back after successful registration
message RegisterHostResponse {
  bool success = 1;
  string message = 2;
  string agent_id = 3;      // UUID of the host
  string agent_key = 4;     // Key for authenticating future requests
  string ca_cert = 5;       // CA certificate in PEM format for TLS verification
  string server_name = 6;   // TLS SNI server name for backend verification (e.g., "watchflare")
  bool reactivated = 7;     // True if existing agent was reactivated (UUID reused), false if new registration
}

// HeartbeatRequest contains info sent with each heartbeat
message HeartbeatRequest {
  string agent_id = 1;      // UUID of the host
  string agent_key = 2;     // Authentication key
  string ip_address_v4 = 3; // Current IPv4 (may change)
  string ip_address_v6 = 4; // Current IPv6 (may change)
  int64 timestamp = 5;      // Unix timestamp in seconds (for anti-replay)
  string agent_version = 6; // Agent binary version, used to update DB immediately after self-update
}

// HeartbeatResponse acknowledges the heartbeat and may carry pending commands
message HeartbeatResponse {
  bool success = 1;
  string message = 2;
  repeated PendingCommand commands = 3;  // Commands to execute (empty if none)
}

// PendingCommand represents a command dispatched from the backend to the agent
message PendingCommand {
  string command_id = 1;  // UUID for deduplication
  string type = 2;        // "collect_packages" | "update_agent"
}

// Metrics contains system performance data
message Metrics {
  double cpu_usage_percent = 1;
  uint64 memory_total_bytes = 2;
  uint64 memory_used_bytes = 3;
  uint64 memory_available_bytes = 4;
  double load_avg_1min = 5;
  double load_avg_5min = 6;
  double load_avg_15min = 7;
  uint64 disk_total_bytes = 8;
  uint64 disk_used_bytes = 9;
  uint64 uptime_seconds = 10;
  int64 timestamp = 11;  // Unix timestamp

  // Disk I/O metrics (bytes per second, computed from delta)
  uint64 disk_read_bytes_per_sec = 12;
  uint64 disk_write_bytes_per_sec = 13;

  // Network metrics (bytes per second, computed from delta)
  uint64 network_rx_bytes_per_sec = 14;
  uint64 network_tx_bytes_per_sec = 15;

  // Temperature (physical servers only, 0 if unavailable)
  double cpu_temperature_celsius = 16;

  // All temperature sensor readings (one entry per sensor key)
  repeated SensorReading sensor_readings = 17;

  // Swap memory
  uint64 swap_total_bytes = 18;
  uint64 swap_used_bytes = 19;

  // Process count
  uint64 processes_count = 20;

  // Memory breakdown (Linux only, 0 on other platforms)
  uint64 memory_buffers_bytes = 21;  // Kernel buffer cache
  uint64 memory_cached_bytes = 22;   // Page cache

  // CPU time breakdown (Linux only, 0 on other platforms)
  double cpu_iowait_percent = 23;    // Waiting for I/O completion
  double cpu_steal_percent = 24;     // CPU stolen by hypervisor (VMs only)
}

// SensorReading represents a single temperature sensor reading
message SensorReading {
  string key = 1;                  // Sensor key (e.g., "PMU tdie1", "NAND CH0 temp")
  double temperature_celsius = 2;  // Temperature in Celsius
}

// ContainerMetric contains per-container performance data
message ContainerMetric {
  string container_id = 1;
  string container_name = 2;
  string image = 3;
  double cpu_percent = 4;
  uint64 memory_used_bytes = 5;
  uint64 memory_limit_bytes = 6;
  uint64 network_rx_bytes_per_sec = 7;
  uint64 network_tx_bytes_per_sec = 8;
  string container_runtime = 9; // "docker", "podman", etc.
  string status = 10;           // e.g. "Up 2 hours", "Restarting (1) 23 seconds ago"
  string health = 11;           // "healthy", "unhealthy", "starting", "" (no healthcheck)
  string ports = 12;            // e.g. "8080:80/tcp, 443:443/tcp"
}

// HostInfo contains slowly-changing host properties sent with every metrics cycle.
// The backend only writes to DB if at least one field has changed.
message HostInfo {
  string platform_version = 1;  // gopsutil PlatformVersion: "43", "22.04"
  string kernel_version = 2;    // gopsutil KernelVersion: "6.17.1-300.fc43.aarch64"
  string kernel_arch = 3;       // gopsutil KernelArch: "x86_64", "aarch64"
  string cpu_model_name = 4;    // gopsutil cpu.InfoStat.ModelName
  int32 cpu_physical_count = 5; // gopsutil cpu.Counts(false)
  int32 cpu_logical_count = 6;  // gopsutil cpu.Counts(true)
  double cpu_mhz = 7;           // gopsutil cpu.InfoStat.Mhz
  string container_runtime = 8; // "docker", "kubernetes", etc. (empty if not in container)
}

// SendMetricsRequest contains authentication and metrics data
message SendMetricsRequest {
  string agent_id = 1;   // UUID of the host
  string agent_key = 2;  // Authentication key
  Metrics metrics = 3;   // System metrics
  int64 timestamp = 4;   // Unix timestamp in seconds (for anti-replay)
  repeated ContainerMetric container_metrics = 5;  // Per-container metrics (empty if no containers)
  string agent_version = 6;         // Agent binary version, sent to keep DB in sync after upgrades
  HostInfo host_info = 7;           // Slowly-changing host properties, updated only on change
}

// SendMetricsResponse acknowledges metric reception
message SendMetricsResponse {
  bool success = 1;
  string message = 2;
}

// BufferedMetric represents a metric stored in the WAL buffer
// This message is used for disk serialization, NOT for gRPC transport
message BufferedMetric {
  string agent_id = 1;      // UUID of the agent
  string agent_key = 2;     // Authentication key
  Metrics metrics = 3;      // System metrics
  int64 collected_at = 4;   // Unix timestamp when metric was collected
  uint32 retry_count = 5;   // Number of retry attempts (0 = first attempt)
}

// ReportDroppedMetricsRequest contains information about metrics that were dropped
message ReportDroppedMetricsRequest {
  string agent_id = 1;       // UUID of the agent
  string agent_key = 2;      // Authentication key
  int64 timestamp = 3;       // Unix timestamp when report was sent
  int32 count = 4;           // Number of metrics dropped
  int64 first_dropped_at = 5; // Timestamp of first dropped metric
  int64 last_dropped_at = 6;  // Timestamp of last dropped metric
  string reason = 7;          // Reason for dropping (e.g., "max_retries_exceeded")
}

// ReportDroppedMetricsResponse acknowledges the dropped metrics report
message ReportDroppedMetricsResponse {
  bool success = 1;
  string message = 2;
}

// =====================================================
// Package Inventory Messages
// =====================================================

// Package represents a single installed package
message Package {
  string name = 1;                   // Package name (e.g., "nginx", "postgresql-15")
  string version = 2;                // Version string (e.g., "1.24.0-1", "15.4-1")
  string architecture = 3;           // Architecture (e.g., "amd64", "arm64", "all")
  string package_manager = 4;        // Package manager type (e.g., "dpkg", "rpm", "brew")
  string source = 5;                 // Repository or source URL
  int64 installed_at = 6;            // Unix timestamp of installation (0 if unknown)
  int64 package_size = 7;            // Package size in bytes
  string description = 8;            // Short description (max 100 chars)
  string available_version = 9;      // Newer version available (empty if up to date)
  bool has_security_update = 10;     // True if available_version is a security update
}

// SendPackageInventoryRequest sends package inventory (delta or full) to backend
message SendPackageInventoryRequest {
  string agent_id = 1;               // UUID of the host
  string agent_key = 2;              // Authentication key
  int64 timestamp = 3;               // Request timestamp (for anti-replay)

  // Inventory type: "delta" or "full"
  // - "delta": Only sends changes (added/removed/updated)
  // - "full": Sends complete package list (used on first run or if state corrupted)
  string inventory_type = 4;

  // Delta inventory (only populated if inventory_type = "delta")
  repeated Package added_packages = 5;    // Newly installed packages
  repeated Package removed_packages = 6;  // Uninstalled packages
  repeated Package updated_packages = 7;  // Packages with version changes

  // Full inventory (only populated if inventory_type = "full")
  repeated Package all_packages = 8;      // Complete package list

  // Collection metadata
  int64 collection_duration_ms = 9;  // Time taken to collect packages (milliseconds)
  int32 total_package_count = 10;    // Total number of packages on system
}

// SendPackageInventoryResponse acknowledges inventory reception
message SendPackageInventoryResponse {
  bool success = 1;
  string message = 2;
  int32 packages_processed = 3;      // Number of packages processed
  int32 changes_detected = 4;        // Number of changes detected (added+removed+updated)
}

// Service Inventory & Health Messages

message Service {
  string name = 1;
  string description = 2;
  string enabled_state = 3;
  string active_state = 4;
  string sub_state = 5;
}

message SendServiceInventoryRequest {
  string agent_id = 1;
  string agent_key = 2;
  int64 timestamp = 3;
  repeated Service services = 4;
}

message SendServiceInventoryResponse {
  bool success = 1;
  string message = 2;
}

message ServiceHealth {
  string name = 1;
  string active_state = 2;
  string sub_state = 3;
}

message ReportServiceHealthRequest {
  string agent_id = 1;
  string agent_key = 2;
  int64 timestamp = 3;
  repeated ServiceHealth services = 4;
  int64 collected_at = 5;
}

message ReportServiceHealthResponse {
  bool success = 1;
  string message = 2;
}
